<p style="margin:0 0 4px;font-size:11px;font-weight:700;letter-spacing:2px;color:#64748b;text-transform:uppercase">Booking Update</p>
<h2 style="margin:0 0 6px;font-size:26px;font-weight:900;color:#f1f5f9;line-height:1.2">Hi {{ name }},</h2>
<p style="margin:0 0 24px;font-size:15px;color:#94a3b8">Your booking status has changed.</p>

<div style="background:#162032;border:1px solid #334155;border-radius:8px;padding:20px;margin-bottom:24px">
  <p style="margin:0 0 10px;font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:1px">Current Status</p>
  {{ status_badge }}
  <p style="margin:16px 0 0;font-size:15px;color:#cbd5e1">{{ status_message }}</p>
</div>

<div style="background:#162032;border:1px solid #334155;border-radius:8px;overflow:hidden">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
    <tr>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#64748b;font-size:13px;width:120px">Service</td>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#f1f5f9;font-weight:600">{{ service }}</td>
    </tr>
    {{ date_row_html }}
    {{ vehicle_row_html }}
    {{ ref_row_html }}
  </table>
</div>
