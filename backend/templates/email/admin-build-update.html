<p style="margin:0 0 4px;font-size:11px;font-weight:700;letter-spacing:2px;color:#64748b;text-transform:uppercase">Admin Notification</p>
<h2 style="margin:0 0 20px;font-size:22px;font-weight:900;color:#f1f5f9">Build Update Posted</h2>

<div style="background:#162032;border:1px solid #334155;border-radius:8px;overflow:hidden;margin-bottom:20px">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
    <tr>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#64748b;font-size:13px;width:120px">Customer</td>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#f1f5f9;font-weight:600">{{ name }}</td>
    </tr>
    <tr>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#64748b;font-size:13px">Contact</td>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#f1f5f9">
        <a href="mailto:{{ email }}" style="color:#f97316;text-decoration:none">{{ email }}</a>{{ phone_html }}
      </td>
    </tr>
    <tr>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#64748b;font-size:13px">Service</td>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#f1f5f9">{{ service }}</td>
    </tr>
    {{ variations_html }}
    <tr>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#64748b;font-size:13px">Ref. #</td>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#f97316;font-weight:700">{{ ref_num }}</td>
    </tr>
    <tr>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#64748b;font-size:13px">Booking ID</td>
      <td style="padding:10px 16px;border-bottom:1px solid #334155;color:#f1f5f9">#{{ booking_id }}</td>
    </tr>
    <tr>
      <td style="padding:10px 16px;color:#64748b;font-size:13px">Posted At</td>
      <td style="padding:10px 16px;color:#f1f5f9">{{ posted_at }}</td>
    </tr>
  </table>
</div>
